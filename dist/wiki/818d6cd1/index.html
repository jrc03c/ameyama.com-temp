  <h3 class="title">Securely wiping a drive or partition in Linux</h3>

  <pre class="language-bash"><code class="language-bash"><span class="token function">sudo</span> shred <span class="token parameter variable">-fvz</span> /dev/sdX</code></pre>
<ul>
<li><code>-f</code> = force write permission if nonexistent</li>
<li><code>-v</code> = be verbose</li>
<li><code>-z</code> = write zeros on final pass</li>
</ul>
