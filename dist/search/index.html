<style>
  #search #search-form {
    margin: 0 0 var(--spacing) 0;
  }

  #search .row input[type="text"] {
    width: 100%;
    flex-shrink: 999999;
  }

  @media (max-width: 768px) {
    #search .row input {
      width: 100%;
      flex-shrink: unset;
    }

    }
  }
</style>
